<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="js/script.js"></script>
</head>
    <body style="background-color: rgb(194, 230, 241);" ></body>
<h1 style="background-color: rgb(234, 225, 157); font-family: 'Inter' , sans-serif; text-align: center; border-radius: 20px;">Welcome to Classmate AI!</h1>
<div class="container" style="text-align: center; padding-bottom: 40px;">
    <button style="background-color: rgb(207, 232, 148);"  id="Homework helper" onclick="window.location.href='homework.html';">Homework Helper!</button>
    <button style="background-color: rgb(240, 167, 167); " id="Clubs finder" onclick="window.location.href='clubs.html';">Clubs Finder!</button>
    <button style="background-color: rgb(217, 189, 136); " id="Home button" onclick="window.location.href='index.html';">Go Home!</button>
    <button style="background-color: rgb(210, 175, 228); " id="Schedule Builder" onclick="window.location.href='schedule.html';">Build Your Schedule!</button>]
</div>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
 
        body {
            background-color: rgb(194, 230, 241);
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            padding-bottom: 40px;
        }
 
        h1 {
            background-color: rgb(234, 225, 157);
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            border-radius: 20px;
            padding: 16px;
            margin: 16px;
        }
 
        .nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 0 16px 24px;
        }
 
        .nav button {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
 
        .main {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
 
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
 
        .card h2 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #333;
        }
 
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #555;
            margin-bottom: 6px;
        }
 
        textarea, select, input[type="text"] {
            width: 100%;
            border: 2px solid #b8dce8;
            border-radius: 10px;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            background: #f7fbfd;
        }
 
        textarea { resize: vertical; }
 
        textarea:focus, select:focus, input:focus {
            outline: none;
            border-color: #6ab4cc;
        }
 
       
        .help-types {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }
 
        .help-type-btn {
            padding: 8px 14px;
            border: 2px solid #b8dce8;
            border-radius: 20px;
            background: #f7fbfd;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
 
        .help-type-btn.active {
            background: rgb(207, 232, 148);
            border-color: #8fbc52;
            font-weight: bold;
        }
 
   
        #chat-box {
            background: #f7fbfd;
            border: 2px solid #b8dce8;
            border-radius: 10px;
            padding: 14px;
            min-height: 200px;
            max-height: 420px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
 
        .message {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
 
        .message.user { flex-direction: row-reverse; }
 
        .bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
 
        .message.user .bubble {
            background: rgb(210, 175, 228);
            border-bottom-right-radius: 4px;
        }
 
        .message.ai .bubble {
            background: white;
            border: 1px solid #dce8ee;
            border-bottom-left-radius: 4px;
        }
 
        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            background: #e8f4f8;
        }
 
        .typing {
            font-style: italic;
            color: #8aaab8;
            font-size: 13px;
        }
 
     
        .chat-input-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
 
        .chat-input-row textarea {
            flex: 1;
            min-height: 44px;
            max-height: 120px;
            padding: 10px 14px;
            font-size: 14px;
        }
 
        .send-btn {
            padding: 10px 18px;
            background: rgb(207, 232, 148);
            border: none;
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            align-self: flex-end;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
 
        .send-btn:hover { opacity: 0.8; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
 
        .clear-btn {
            padding: 6px 14px;
            background: #f0e0e0;
            border: none;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            cursor: pointer;
            margin-top: 6px;
        }
 
        .clear-btn:hover { opacity: 0.8; }
 
        .hint {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
            font-style: italic;
        }
 
        .error-msg {
            color: #c0392b;
            background: #fdecea;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
        }
 
        .empty-state {
            text-align: center;
            color: #aac8d4;
            font-size: 13px;
            padding: 30px 0;
        }
    </style>
<body> 
<div class="main">
 
 
    <div class="card">
        <h2> What are you working on?</h2>
        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="e.g. AP Biology, Algebra 2, English Lit...">
 
        <div style="margin-top: 14px;">
            <label for="rubric">Paste your rubric, instructions, or question (optional but helpful)</label>
            <textarea id="rubric" rows="4" placeholder="e.g. Write a 5-paragraph essay comparing two themes in Romeo & Juliet. Must include textual evidence..."></textarea>
        </div>
 
        <div style="margin-top: 14px;">
            <label>What kind of help do you need?</label>
            <div class="help-types">
                <button class="help-type-btn active" onclick="selectHelp(this, 'understand')">Understand it</button>
                <button class="help-type-btn" onclick="selectHelp(this, 'check')">Check my work</button>
                <button class="help-type-btn" onclick="selectHelp(this, 'stuck')">I'm stuck</button>
                <button class="help-type-btn" onclick="selectHelp(this, 'plan')">Help me plan</button>
                <button class="help-type-btn" onclick="selectHelp(this, 'explain')"> Explain a concept</button>
            </div>
        </div>
    </div>
 
   
    <div class="card">
        <h2> Chat with your Homework Helper</h2>
        <div id="chat-box">
            <div class="empty-state">Ask a question below to get started! </div>
        </div>
        <p class="hint"> I'll guide you and explain concepts — but I won't just do the work for you!</p>
        <div class="chat-input-row">
            <textarea id="user-input" rows="2" placeholder="Ask your question here..." onkeydown="handleKey(event)"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
        </div>
        <button class="clear-btn" onclick="clearChat()">Clear chat</button>
    </div>
 
</div>
 
<script>
    const OPENAI_API_KEY = "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";
 
    let helpMode = "understand";
    let conversationHistory = [];
 
    function selectHelp(btn, mode) {
        document.querySelectorAll('.help-type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        helpMode = mode;
    }
 
    function buildSystemPrompt() {
        const subject = document.getElementById('subject').value.trim();
        const rubric = document.getElementById('rubric').value.trim();
 
        const modeInstructions = {
            understand: "Help the student understand the assignment and concepts involved. Ask them guiding questions. Don't give away answers.",
            check: "Review the student's work, point out what's good, and explain what could be improved. Give specific feedback but don't rewrite it for them.",
            stuck: "The student is stuck. Help them identify where they're struggling and give a small nudge or hint in the right direction. Don't solve it for them.",
            plan: "Help the student make a plan or outline for how to approach the assignment. Break it into manageable steps.",
            explain: "Explain the concept the student is asking about clearly, using examples. Connect it back to their assignment if relevant."
        };
 
        return `You are a supportive, encouraging homework helper AI for a student. Your job is to GUIDE and EXPLAIN — never to do the work for the student. Always help them think, not think for them.
 
${subject ? `Subject: ${subject}` : ""}
${rubric ? `Assignment/Rubric: ${rubric}` : ""}
 
Current help mode: ${modeInstructions[helpMode]}
 
Rules:
- Never write essays, complete solutions, or full answers for the student
- If they ask you to "just write it" or "just solve it," gently decline and offer to guide them instead
- Be encouraging, patient, and friendly
- Use simple language — this is a student
- Keep responses focused and not too long (3-5 sentences or a short list is usually best)
- If appropriate, ask the student a question back to get them thinking`;
    }
 
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const userText = input.value.trim();
        if (!userText) return;
 
       
        appendMessage('user', userText);
        input.value = '';
 
   
        conversationHistory.push({ role: "user", content: userText });
 
       
        const typingId = appendTyping();
        document.getElementById('send-btn').disabled = true;
 
        try {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${OPENAI_API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: [
                        { role: "system", content: buildSystemPrompt() },
                        ...conversationHistory
                    ],
                    max_tokens: 600,
                    temperature: 0.7
                })
            });
 
            removeTyping(typingId);
 
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || `API error ${response.status}`);
            }
 
            const data = await response.json();
            const aiReply = data.choices[0].message.content;
 
            conversationHistory.push({ role: "assistant", content: aiReply });
            appendMessage('ai', aiReply);
 
        } catch (err) {
            removeTyping(typingId);
            appendError(`Something went wrong: ${err.message}`);
        }
 
        document.getElementById('send-btn').disabled = false;
        input.focus();
    }
 
 
 
    function appendTyping() {
        const chatBox = document.getElementById('chat-box');
        const id = 'typing-' + Date.now();
        const div = document.createElement('div');
        div.id = id;
        div.className = 'message ai';
        div.innerHTML = `<div class="avatar"></div><div class="bubble typing">Thinking...</div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return id;
    }
 
    function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }
 
    function appendError(msg) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = 'error-msg';
        div.textContent = + msg;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
 
    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }
 
    function clearChat() {
        conversationHistory = [];
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML = '<div class="empty-state">Ask a question below to get started! </div>';
    }
 
    function appendMessage(role, text) {
    const chatBox = document.getElementById('chat-box');
    const empty = chatBox.querySelector('.empty-state');
    if (empty) empty.remove();
 
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
 
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'You' : 'AI';
 
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
 
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

</script>
</body>
</html>
