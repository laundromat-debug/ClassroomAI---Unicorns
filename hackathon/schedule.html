<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="js/script.js"></script>
</head>
<body style="background-color: rgb(194, 230, 241);" >
<h1 style="background-color: rgb(234, 225, 157); font-family: 'Inter' , sans-serif; text-align: center; border-radius: 20px;">Welcome to Classmate AI!</h1>
<div class="container" style="text-align: center; padding-bottom: 40px;">
    <button style="background-color: rgb(207, 232, 148);"  id="Homework helper" onclick="window.location.href='homework.html';">Homework Helper!</button>
    <button style="background-color: rgb(240, 167, 167); " id="Clubs finder" onclick="window.location.href='clubs.html';">Clubs Finder!</button>
    <button style="background-color: rgb(217, 189, 136); " id="Home button" onclick="window.location.href='index.html';">Go Home!</button>
    <button style="background-color: rgb(210, 175, 228); " id="Schedule Builder" onclick="window.location.href='schedule.html';">Build Your Schedule!</button>
</div>
</body>
<head>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
 
        body {
            background-color: rgb(194, 230, 241);
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            padding-bottom: 40px;
        }
 
        h1 {
            background-color: rgb(234, 225, 157);
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            border-radius: 20px;
            padding: 16px;
            margin: 16px;
        }
 
        .nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 0 16px 24px;
        }
 
        .nav button {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
 
        .main {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
 
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
 
        .card h2 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #333;
        }
 
        textarea {
            width: 100%;
            border: 2px solid #b8dce8;
            border-radius: 10px;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: vertical;
            background: #f7fbfd;
        }
 
        textarea:focus {
            outline: none;
            border-color: #6ab4cc;
        }
 
        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
 
        .row select, .row input {
            flex: 1;
            min-width: 140px;
            padding: 9px 12px;
            border: 2px solid #b8dce8;
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            background: #f7fbfd;
        }
 
        .row select:focus, .row input:focus {
            outline: none;
            border-color: #6ab4cc;
        }
 
        .generate-btn {
            width: 100%;
            padding: 14px;
            background-color: rgb(210, 175, 228);
            border: none;
            border-radius: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
 
        .generate-btn:hover { opacity: 0.85; }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
 
        #output-card {
            display: none;
        }
 
        #output-card h2 {
            margin-bottom: 12px;
        }
 
        #schedule-output {
            background: #f7fbfd;
            border: 2px solid #b8dce8;
            border-radius: 10px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            min-height: 100px;
        }
 
        .loading {
            text-align: center;
            color: #6ab4cc;
            font-style: italic;
            padding: 20px;
        }
 
        .error {
            color: #c0392b;
            background: #fdecea;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
        }
 
        .copy-btn {
            margin-top: 10px;
            padding: 8px 18px;
            background: rgb(207, 232, 148);
            border: none;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }
 
        .copy-btn:hover { opacity: 0.8; }
 
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #555;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
<div class="main">
 
    <div class="card">
        <h2>Your Wake up and Bedtime</h2>
        <div class="row">
            <div style="flex:1; min-width:140px;">
                <label for="wake">Wake up</label>
                <input type="time" id="wake" value="07:00">
            </div>
            <div style="flex:1; min-width:140px;">
                <label for="sleep">Bedtime</label>
                <input type="time" id="sleep" value="22:00">
            </div>
        </div>
    </div>
 
    <div class="card">
        <h2>Classes & Syllabus</h2>
        <label for="classes">List your classes and any upcoming tests, projects, or deadlines:</label>
        <textarea id="classes" rows="4" placeholder="e.g. AP Bio (test Friday), Algebra 2 (homework due Mon), English (essay due next week)..."></textarea>
    </div>
 
    <div class="card">
        <h2>Extracurriculars & Commitments</h2>
        <label for="extracurriculars">What activities do you have and when?</label>
        <textarea id="extracurriculars" rows="3" placeholder="e.g. Soccer practice Mon/Wed 4-6pm, Piano lessons Thursday 5pm, volunteering Saturday morning..."></textarea>
    </div>
 
    <div class="card">
        <h2>Homework & Study Plan</h2>
        <label for="homework">What homework or studying do you need to get done?</label>
        <textarea id="homework" rows="3" placeholder="e.g. 30 pages of reading, math problem set (20 problems), study for vocab quiz..."></textarea>
    </div>
 
    <div class="card">
        <h2>Schedule Options</h2>
        <div class="row">
            <div style="flex:1; min-width:140px;">
                <label for="schedule-type">Build a schedule for:</label>
                <select id="schedule-type">
                    <option value="day">Today (day)</option>
                    <option value="week">This week</option>
                    <option value="month">This month</option>
                </select>
            </div>
            <div style="flex:1; min-width:140px;">
                <label for="break-pref">Break preference:</label>
                <select id="break-pref">
                    <option value="short">Short breaks (5-10 min)</option>
                    <option value="long">Longer breaks (15-30 min)</option>
                    <option value="minimal">Minimal breaks</option>
                </select>
            </div>
        </div>
        <div style="margin-top: 12px;">
            <label for="extra-notes">Anything else? (optional)</label>
            <textarea id="extra-notes" rows="2" placeholder="e.g. I focus better in the morning, I need time to eat dinner with family at 7pm..."></textarea>
        </div>
    </div>
 
    <button class="generate-btn" id="generate-btn" onclick="generateSchedule()"> Build My Schedule</button>
 
    <div class="card" id="output-card">
        <h2>Your Schedule</h2>
        <div id="schedule-output"></div>
        <button class="copy-btn" onclick="copySchedule()">Copy Schedule</button>
    </div>
 
</div>
 
<script>
    const OPENAI_API_KEY = "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";
 
    async function generateSchedule() {
        const classes = document.getElementById('classes').value.trim();
        const extracurriculars = document.getElementById('extracurriculars').value.trim();
        const homework = document.getElementById('homework').value.trim();
        const wake = document.getElementById('wake').value;
        const sleep = document.getElementById('sleep').value;
        const scheduleType = document.getElementById('schedule-type').value;
        const breakPref = document.getElementById('break-pref').value;
        const extraNotes = document.getElementById('extra-notes').value.trim();
 
        if (!classes && !extracurriculars && !homework) {
            alert("Please fill in at least one section so I can build your schedule!");
            return;
        }
 
        const outputCard = document.getElementById('output-card');
        const outputDiv = document.getElementById('schedule-output');
        const btn = document.getElementById('generate-btn');
 
        outputCard.style.display = 'block';
        outputDiv.innerHTML = '<div class="loading">⏳ Building your schedule...</div>';
        btn.disabled = true;
        btn.textContent = '⏳ Building...';
 
        const breakText = {
            short: "short 5-10 minute breaks between tasks",
            long: "longer 15-30 minute breaks between tasks",
            minimal: "minimal breaks, only when necessary"
        }[breakPref];
 
        const prompt = `You are a helpful student schedule assistant. Build a realistic, detailed ${scheduleType} schedule for a student with the following information:
 
Wake up time: ${wake}
Bedtime: ${sleep}
Break preference: ${breakText}
 
Classes & upcoming deadlines:
${classes || "Not specified"}
 
Extracurriculars & commitments:
${extracurriculars || "None listed"}
 
Homework & studying needed:
${homework || "Not specified"}
 
Additional notes:
${extraNotes || "None"}
 
Please create a clear, hour-by-hour ${scheduleType} schedule. Use time blocks like "7:00 AM 7:30 AM: Morning routine". Be realistic, include meals, breaks, and free time. Prioritize urgent deadlines. Format it cleanly so it's easy to read and follow.`;
 
        try {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${OPENAI_API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: [{ role: "user", content: prompt }],
                    max_tokens: 1500,
                    temperature: 0.7
                })
            });
 
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || `API error ${response.status}`);
            }
 
            const data = await response.json();
            const schedule = data.choices[0].message.content;
            outputDiv.textContent = schedule;
 
        } catch (err) {
            outputDiv.innerHTML = `<div class="error">Something went wrong: ${err.message}<br><br>Double-check that your API key is correct and has credits.</div>`;
        }
 
        btn.disabled = false;
        btn.textContent = 'Build My Schedule';
        outputCard.scrollIntoView({ behavior: 'smooth' });
    }
 
    function copySchedule() {
        const text = document.getElementById('schedule-output').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy Schedule', 2000);
        });
    }
</script>
 
</body>
</html>
